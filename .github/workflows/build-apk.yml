name: Build Android APK (Cordova)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Setup Java JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build APK
        run: |
          cordova platform add android --no-telemetry
          cordova build android --device --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Aplikasi-RIASEC-APK
          path: platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
