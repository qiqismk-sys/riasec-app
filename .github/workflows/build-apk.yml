name: Build Android APK (Cordova)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Install Project Dependencies
        run: npm install

      - name: Build APK (Debug)
        run: |
          cordova platform add android --no-telemetry 2>&1 | tee cordova_platform_add.log
          cordova build android --no-telemetry 2>&1 | tee cordova_build.log

      - name: Locate Build Outputs
        run: |
          echo "=== APK Files ==="
          find platforms -name "*.apk" || true
          echo "=== AAB Files ==="
          find platforms -name "*.aab" || true

      - name: Push Build Logs on Failure
        if: failure()
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add cordova_platform_add.log cordova_build.log || true
          git commit -m "chore: add build logs on failure [skip ci]" || true
          git push || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-RIASEC-APK
          path: |
            platforms/**/*.apk
            platforms/**/*.aab
          if-no-files-found: error


