name: Build Android APK (Cordova)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle 7.6
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '7.6'

      - name: Install Android Build Tools 33.0.2
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2"

      - name: Install Cordova
        run: npm install -g cordova



      - name: Install Project Dependencies
        run: npm install

      - name: Build APK (Debug)
        run: |
          cordova platform add android --no-telemetry 2>&1 | tee cordova_platform_add.log
          cordova build android --no-telemetry 2>&1 | tee cordova_build.log

      - name: Locate Build Outputs
        run: |
          echo "=== APK Files ==="
          find platforms -name "*.apk" 2>&1 | tee find_apk.log || true
          echo "=== AAB Files ==="
          find platforms -name "*.aab" 2>&1 | tee find_aab.log || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-RIASEC-APK
          path: |
            platforms/**/*.apk
            platforms/**/*.aab
          if-no-files-found: error

      - name: Push Build Logs and Output Info
        if: always()
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add cordova_platform_add.log cordova_build.log find_apk.log find_aab.log || true
          git commit -m "chore: add build logs and output info [skip ci]" || true
          git push || true



